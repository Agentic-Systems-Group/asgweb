name: Deploy to Cloudflare Workers

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: agentic-systems-group-site/package-lock.json

      - name: Install deps
        working-directory: agentic-systems-group-site
        run: npm ci

      - name: Build Astro
        working-directory: agentic-systems-group-site
        run: npm run build

      - name: Verify build artifacts
        run: |
          pwd
          ls -la
          ls -la agentic-systems-group-site/dist

      - name: Wrangler version
        run: npx --yes wrangler --version

      - name: Deploy with Wrangler CLI
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler deploy --verbose --experimental-json-config

